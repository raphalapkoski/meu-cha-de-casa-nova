@if (gestaoState.loading()) {
<div class="flex items-center justify-center py-12">
  <div class="border-muted-foreground h-8 w-8 animate-spin rounded-full border-2 border-t-transparent" role="status">
    <span class="sr-only">Carregando...</span>
  </div>
</div>
} @else if (gestaoState.items().length === 0) {
<div class="flex flex-col items-center justify-center py-12 text-center">
  <p class="text-muted-foreground text-sm">Ops, ainda não há nenhum item cadastrado.</p>
</div>
} @else {
<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-x-8 gap-y-4">
  @for (item of gestaoState.items(); track item.id) {
   <div class="flex flex-col border rounded-md shadow px-4 py-4 gap-y-2 justify-end bg-white items-center">
    <img [src]="item.image" [alt]="item.name" class="aspect-square rounded-sm shadow" />
    <span class="font-medium text-center truncate w-full">{{ item.name }}</span>
    <div class="flex gap-2 flex-col sm:flex-row">
      <button (click)="gestaoState.onOpenDialogEdit(item)" hlmBtn variant="outline" size="sm" class="flex items-center gap-1">
        <svg lucidePencil class="h-4 w-4"></svg>
        Editar
      </button>
      <button (click)="gestaoState.onDelete(item)" hlmBtn variant="outline" size="sm" class="flex items-center gap-1">
        <svg lucideTrash2 class="h-4 w-4"></svg>
        Excluir
      </button>
    </div>
  </div>
  }
</div>
}
