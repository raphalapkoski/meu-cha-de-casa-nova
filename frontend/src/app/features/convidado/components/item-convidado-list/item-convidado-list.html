@if (convidadoState.loading()) {
<div class="flex items-center justify-center py-12">
  <div class="border-muted-foreground h-8 w-8 animate-spin rounded-full border-2 border-t-transparent" role="status">
    <span class="sr-only">Carregando...</span>
  </div>
</div>
} @else if (convidadoState.items().length === 0) {
<div class="flex flex-col items-center justify-center py-12 text-center">
  <p class="text-muted-foreground text-sm">Nenhum item disponível no momento.</p>
</div>
} @else {
<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-x-8 gap-y-4">
  @for (item of convidadoState.items(); track item.id) {
  <!-- <div class="flex flex-col border rounded-2xl px-2 pb-4 gap-y-2 aspect-square justify-end bg-no-repeat  bg-contain bg-center"
  [style.backgroundImage]="'url(' + item.image + ')'">
  <div class="bg-white/80 flex flex-col rounded-sm p-2 shadow">
<span class="font-medium text-center truncate w-full text-black ">{{ item.name }}</span>
    <button hlmBtn [disabled]="isDisabled(item.status)"> {{ item.status === 'unavaible' ? 'Obá, item comprado' : 'Oba, comprei!!!' }}</button>
  </div>
  </div> -->
   <div class="flex flex-col border rounded-2xl px-2 py-4 gap-y-2 justify-end bg-white">
    <img [src]="item.image" class="aspect-square rounded-sm"/>
<span class="font-medium text-center truncate w-full text-black ">{{ item.name }}</span>
    <button hlmBtn [disabled]="isDisabled(item.status)"> {{ item.status === 'unavaible' ? 'Obá, item comprado' : 'Oba, comprei!!!' }}</button>
  </div>
  }
</div>
}
